document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#050508;--ink:#f4f1ff;--ink-dim:#9591a8;--ink-mute:#5a566c;\n    --violet:#7c50ff;--violet-2:#a37cff;--violet-deep:#3c1f9c;\n    --line:rgba(255,255,255,0.07);--line-strong:rgba(255,255,255,0.14);\n    --bad:#ff6b7a;--ok:#5ee0a5;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--bg);color:var(--ink);font-family:\"Geist\",ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}\n  body{cursor:none}\n  a{color:inherit;text-decoration:none}\n  button,input{font-family:inherit;color:inherit}\n  ::selection{background:var(--violet);color:#fff}\n\n  /* Cursor */\n  .cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:screen}\n  .cursor-dot{width:6px;height:6px;border-radius:50%;background:var(--violet-2);box-shadow:0 0 12px var(--violet),0 0 30px var(--violet);transform:translate(-50%,-50%)}\n  .cursor-ring{width:38px;height:38px;border-radius:50%;border:1px solid rgba(163,124,255,0.45);transform:translate(-50%,-50%);transition:width .25s, height .25s, border-color .25s, background .25s}\n  .cursor-ring.is-hover{width:62px;height:62px;border-color:rgba(163,124,255,0.9);background:rgba(124,80,255,0.08)}\n  @media (max-width:780px), (pointer:coarse){body{cursor:auto}.cursor-dot,.cursor-ring{display:none}button,a,input{cursor:auto}input{cursor:text}}\n\n  /* Background fx */\n  .bg-orbs{position:fixed;inset:0;z-index:-1;overflow:hidden}\n  .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55;animation:float 14s ease-in-out infinite}\n  .orb-1{width:560px;height:560px;background:radial-gradient(circle,#7c50ff 0%,transparent 65%);top:-180px;left:-120px}\n  .orb-2{width:520px;height:520px;background:radial-gradient(circle,#3c1f9c 0%,transparent 65%);bottom:-160px;right:-120px;animation-delay:-6s}\n  .orb-3{width:360px;height:360px;background:radial-gradient(circle,#a37cff 0%,transparent 70%);top:55%;left:60%;opacity:.3;animation-delay:-9s}\n  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.06)}66%{transform:translate(-30px,40px) scale(.96)}}\n  .grid-bg{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse at 50% 40%,#000 0%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at 50% 40%,#000 0%,transparent 75%)}\n\n  /* Top bar */\n  .top{position:relative;z-index:10;padding:22px 36px;display:flex;align-items:center;justify-content:space-between}\n  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-0.02em;font-size:18px}\n  .brand-mark{width:30px;height:30px;display:grid;place-items:center;filter:drop-shadow(0 6px 18px rgba(124,80,255,0.55))}\n  .brand-mark img{width:100%;height:100%;object-fit:contain;display:block}\n  .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--ink-dim);font-size:13.5px;font-family:\"Geist Mono\",monospace;text-transform:uppercase;letter-spacing:.06em;transition:color .25s}\n  .back-link:hover{color:#fff}\n  @media(max-width:600px){.top{padding:16px 18px}}\n\n  /* Layout */\n  .shell{max-width:1200px;margin:0 auto;padding:40px 36px 80px;display:grid;grid-template-columns:1fr 480px;gap:60px;align-items:center;min-height:calc(100vh - 120px)}\n  @media(max-width:980px){.shell{grid-template-columns:1fr;gap:40px;padding-top:20px}}\n  @media(max-width:600px){.shell{padding:20px 18px 60px}}\n\n  /* Left column */\n  .left .eyebrow{display:inline-flex;align-items:center;gap:10px;padding:6px 14px;border-radius:999px;background:rgba(124,80,255,0.10);border:1px solid rgba(124,80,255,0.28);font-size:12px;color:#c8b8ff;font-family:\"Geist Mono\",monospace;letter-spacing:.04em;text-transform:uppercase;margin-bottom:26px}\n  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--violet-2);box-shadow:0 0 10px var(--violet);animation:pulse 2s ease-in-out infinite}\n  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.35)}}\n  .left h1{font-size:clamp(40px,5vw,68px);line-height:0.98;letter-spacing:-0.04em;font-weight:700;margin-bottom:22px}\n  .left h1 em{font-family:\"Instrument Serif\",serif;font-style:italic;font-weight:400;background:linear-gradient(180deg,#e8dcff 0%,#a37cff 70%,#7c50ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}\n  .left .sub{color:var(--ink-dim);font-size:16.5px;line-height:1.55;max-width:480px;margin-bottom:36px}\n\n  .bullets{display:flex;flex-direction:column;gap:14px;margin-top:8px}\n  .bullets li{list-style:none;display:flex;align-items:flex-start;gap:12px;color:var(--ink-dim);font-size:14.5px;line-height:1.5}\n  .bullets svg{flex-shrink:0;width:20px;height:20px;stroke:var(--violet-2);fill:none;stroke-width:2;margin-top:1px}\n  .bullets b{color:var(--ink);font-weight:500}\n\n  .trust{margin-top:42px;display:flex;align-items:center;gap:14px;color:var(--ink-mute);font-size:13px}\n  .avatars{display:flex}\n  .avatars span{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg);margin-left:-7px;background:linear-gradient(135deg,#7c50ff,#3c1f9c);display:grid;place-items:center;color:#fff;font-size:10px;font-weight:600}\n  .avatars span:first-child{margin-left:0;background:linear-gradient(135deg,#ffd0e0,#ff7eaf)}\n  .avatars span:nth-child(2){background:linear-gradient(135deg,#9676ff,#5a31db)}\n  .avatars span:nth-child(3){background:linear-gradient(135deg,#ffce6a,#ff8c3b)}\n  .stars{color:#ffce6a;letter-spacing:.1em}\n\n  /* Card */\n  .card{position:relative;border-radius:24px;background:linear-gradient(170deg,rgba(20,17,32,0.7) 0%,rgba(10,9,18,0.7) 100%);border:1px solid var(--line-strong);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:40px;box-shadow:0 50px 120px -40px rgba(124,80,255,0.45),0 30px 60px -30px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06);overflow:hidden}\n  .card::before{content:\"\";position:absolute;inset:-1px;border-radius:24px;padding:1px;background:linear-gradient(180deg,rgba(163,124,255,0.55),transparent 60%);mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);-webkit-mask:linear-gradient(#000,#000) content-box,linear-gradient(#000,#000);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}\n  @media(max-width:600px){.card{padding:28px 24px}}\n\n  /* Stepper */\n  .steps{display:flex;align-items:center;gap:12px;margin-bottom:30px;font-family:\"Geist Mono\",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute)}\n  .step{display:flex;align-items:center;gap:8px}\n  .step .n{width:24px;height:24px;border-radius:50%;border:1px solid var(--line-strong);display:grid;place-items:center;font-size:11px;background:rgba(255,255,255,0.02);transition:all .35s}\n  .step.active{color:var(--ink)}\n  .step.active .n{background:linear-gradient(180deg,#9676ff,#7c50ff);border-color:transparent;color:#fff;box-shadow:0 0 0 4px rgba(124,80,255,0.18)}\n  .step.done .n{background:rgba(124,80,255,0.18);border-color:rgba(124,80,255,0.55);color:var(--violet-2)}\n  .step-bar{flex:1;height:1px;background:var(--line);position:relative;overflow:hidden;min-width:18px}\n  .step-bar::after{content:\"\";position:absolute;inset:0;background:linear-gradient(90deg,var(--violet),var(--violet-2));transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.2,.7,.2,1)}\n  .step-bar.fill::after{transform:scaleX(1)}\n\n  .card h2{font-size:26px;letter-spacing:-0.025em;font-weight:600;margin-bottom:8px}\n  .card .lede{color:var(--ink-dim);font-size:14.5px;line-height:1.55;margin-bottom:30px}\n\n  /* Form */\n  .field{margin-bottom:18px;position:relative}\n  .field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:8px;font-family:\"Geist Mono\",monospace;text-transform:uppercase;letter-spacing:.06em}\n  .input{position:relative}\n  .input input{width:100%;padding:16px 18px 16px 48px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid var(--line-strong);font-size:15px;color:var(--ink);outline:none;transition:border-color .25s, background .25s, box-shadow .25s;cursor:none}\n  .input input::placeholder{color:var(--ink-mute)}\n  .input input:focus{border-color:rgba(163,124,255,0.7);background:rgba(124,80,255,0.05);box-shadow:0 0 0 4px rgba(124,80,255,0.12)}\n  .input.invalid input{border-color:rgba(255,107,122,0.6)}\n  .input.invalid input:focus{box-shadow:0 0 0 4px rgba(255,107,122,0.15)}\n  .input .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--ink-mute);pointer-events:none;transition:color .25s}\n  .input.invalid .ic{color:var(--bad)}\n  .input input:focus + .ic, .input:focus-within .ic{color:var(--violet-2)}\n  .err{display:none;margin-top:6px;font-size:12px;color:var(--bad);font-family:\"Geist Mono\",monospace}\n  .input.invalid ~ .err{display:block}\n  @media (pointer:coarse){.input input{cursor:text}}\n\n  .checkbox{display:flex;align-items:flex-start;gap:11px;margin:18px 0 6px;font-size:13px;color:var(--ink-dim);line-height:1.5;cursor:none}\n  .checkbox input{display:none}\n  .checkbox .box{flex-shrink:0;width:18px;height:18px;border-radius:5px;border:1px solid var(--line-strong);background:rgba(255,255,255,0.03);display:grid;place-items:center;margin-top:1px;transition:all .25s}\n  .checkbox .box svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transform:scale(.5);transition:all .2s}\n  .checkbox input:checked + .box{background:linear-gradient(180deg,#9676ff,#7c50ff);border-color:transparent}\n  .checkbox input:checked + .box svg{opacity:1;transform:scale(1)}\n  .checkbox a{color:var(--violet-2);border-bottom:1px solid rgba(163,124,255,0.4)}\n  .checkbox a:hover{color:#fff;border-color:#fff}\n\n  /* Buttons */\n  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 24px;border-radius:12px;font-size:15px;font-weight:600;letter-spacing:-0.005em;border:0;transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, background .25s, opacity .25s;width:100%;cursor:none;font-family:inherit}\n  .btn-violet{background:linear-gradient(180deg,#9676ff 0%,#7c50ff 55%,#5a31db 100%);color:#fff;box-shadow:0 10px 40px rgba(124,80,255,0.55),inset 0 1px 0 rgba(255,255,255,0.35),inset 0 -1px 0 rgba(0,0,0,0.35)}\n  .btn-violet:hover{transform:translateY(-1px);box-shadow:0 16px 60px rgba(124,80,255,0.75),inset 0 1px 0 rgba(255,255,255,0.45)}\n  .btn-violet:active{transform:translateY(0)}\n  .btn:disabled{opacity:.5;transform:none;box-shadow:none}\n  .btn .arrow{transition:transform .25s}\n  .btn:hover:not(:disabled) .arrow{transform:translateX(3px)}\n  .btn-ghost{background:rgba(255,255,255,0.04);color:var(--ink);border:1px solid var(--line-strong);box-shadow:none}\n  .btn-ghost:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.25);transform:translateY(-1px)}\n  .btn .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}\n  @keyframes spin{to{transform:rotate(360deg)}}\n\n  .divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--ink-mute);font-size:11px;font-family:\"Geist Mono\",monospace;text-transform:uppercase;letter-spacing:.1em}\n  .divider::before,.divider::after{content:\"\";flex:1;height:1px;background:var(--line)}\n  .sso{display:flex;gap:10px}\n  .sso button{flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid var(--line-strong);font-size:13px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:none;transition:all .25s;color:var(--in .5-3.1-11.3-7.6l-6.6 5.1C9.6 39.6 16.3 44 24 44z\"><\u002Fpath><path fill=\"#1976D2\" d=\"M43.6 20.5H42V20H24v8h11.3c-.8 2.4-2.4 4.4-4.4 5.9l6.3 5.3C41 35.7 44 30.4 44 24c0-1.3-.1-2.4-.4-3.5z\"><\u002Fpath><\u002Fsvg>\n              Google\n            <\u002Fbutton>\n            <button type=\"button\" data-sso=\"microsoft\" data-hover=\"\">\n              <svg viewBox=\"0 0 24 24\"><rect x=\"2\" y=\"2\" width=\"9\" height=\"9\" fill=\"#F25022\"><\u002Frect><rect x=\"13\" y=\"2\" width=\"9\" height=\"9\" fill=\"#7FBA00\"><\u002Frect><rect x=\"2\" y=\"13\" width=\"9\" height=\"9\" fill=\"#00A4EF\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"9\" height=\"9\" fill=\"#FFB900\"><\u002Frect><\u002Fsvg>\n              Microsoft\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <p class=\"legal\">Cifrato end-to-end · Server EU · GDPR compliant<\u002Fp>\n        <\u002Fform>\n      <\u002Fdiv>\n\n      <!-- ── SCREEN 2: DOWNLOAD ─────────────────────────────── -->\n      <div class=\"screen\" id=\"screen2\">\n        <div class=\"check\">\n          <svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <p class=\"greet\">Bentornato <span id=\"greetName\">amico<\u002Fspan><\u002Fp>\n        <h2 class=\"dl-title\">Account creato. <em>Ora scarica.<\u002Fem><\u002Fh2>\n        <p class=\"dl-sub\">Abbiamo riconosciuto il tuo browser. La versione qui sotto è quella ottimizzata per te.<\u002Fp>\n\n        <div class=\"browsers\" id=\"browsers\">\n          <button type=\"button\" class=\"browser\" data-browser=\"chrome\" data-hover=\"\">\n            <svg viewBox=\"0 0 48 48\"><circle cx=\"24\" cy=\"24\" r=\"22\" fill=\"#fff\"><\u002Fcircle><circle cx=\"24\" cy=\"24\" r=\"9\" fill=\"#4285F4\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle><path fill=\"#EA4335\" d=\"M24 2C14.6 2 6.6 8 3.7 16.4l9.3 5.4C14 17.3 18.6 14 24 14h17.7C38 6.7 31.6 2 24 2z\"><\u002Fpath><path fill=\"#FBBC04\" d=\"M2 24c0 4.8 1.5 9.2 4.1 12.8l9.3-5.4C14 29.5 13 26.9 13 24c0-2.9 1-5.5 2.5-7.6L6.2 11C3.6 14.6 2 19 2 24z\"><\u002Fpath><path fill=\"#34A853\" d=\"M24 34c-4.5 0-8.4-2.4-10.6-6L4.1 33.4C7.3 39.7 14.5 44 24 44c3.5 0 6.7-.8 9.7-2.3L29 33.1c-1.5.6-3.2 1-5 .9z\"><\u002Fpath><\u002Fsvg>\n            Chrome\n            <span class=\"check-tick\"><\u002Fspan>\n          <\u002Fbutton>\n          <button type=\"button\" class=\"browser\" data-browser=\"edge\" data-hover=\"\">\n            <svg viewBox=\"0 0 48 48\"><circle cx=\"24\" cy=\"24\" r=\"22\" fill=\"#0078D4\"><\u002Fcircle><path fill=\"#fff\" d=\"M24 11c-7 0-13 5-13 13 0 1.5.3 3 .8 4.3-1.7 1.4-3.3 3-3.3 5.3 0 3.7 4.4 6.4 12 6.4 4 0 7.5-.7 9.8-2.6-3 .7-6 .8-9 .3-6-1-9.5-3.7-9.5-7 0-1.5.7-2.7 1.8-3.5 1.4 4 5.2 7 9.8 7 5.5 0 10-4.2 10-9.4 0-7-7-13.8-9.4-13.8z\"><\u002Fpath><\u002Fsvg>\n            Edge\n            <span class=\"check-tick\"><\u002Fspan>\n          <\u002Fbutton>\n          <button type=\"button\" class=\"browser\" data-browser=\"brave\" data-hover=\"\">\n            <svg viewBox=\"0 0 48 48\"><path fill=\"#FB542B\" d=\"M24 4 14 8l-3 4-3 1 2 5-2 4 2 4 3 11 5 4 6 3 6-3 5-4 3-11 2-4-2-4 2-5-3-1-3-4z\"><\u002Fpath><path fill=\"#fff\" d=\"m24 18-5 2 3 2-2 5 4 3 4-3-2-5 3-2z\"><\u002Fpath><\u002Fsvg>\n            Brave\n            <span class=\"check-tick\"><\u002Fspan>\n          <\u002Fbutton>\n          <button type=\"button\" class=\"browser\" data-browser=\"arc\" data-hover=\"\">\n            <svg viewBox=\"0 0 48 48\"><defs><linearGradient id=\"arcg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0%\" stop-color=\"#FF6B9E\"><\u002Fstop><stop offset=\"50%\" stop-color=\"#9C5CE5\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#FFA351\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><circle cx=\"24\" cy=\"24\" r=\"20\" fill=\"url(#arcg)\"><\u002Fcircle><path fill=\"#fff\" d=\"M16 30v-9c0-3 2-5 4-5s3 1 4 3l4 7v-9h3v14h-3l-7-12v12z\" opacity=\".95\"><\u002Fpath><\u002Fsvg>\n            Arc\n            <span class=\"check-tick\"><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"meta\">\n          <div>\n            <span class=\"k\">File<\u002Fspan>\n            <span class=\"v\" id=\"fileName\">context-v2.4.1.crx<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <span class=\"k\">Dimensione<\u002Fspan>\n            <span class=\"v\">3.2 MB<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <span class=\"verified\">\n              <svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n              Verificato\n            <\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <button type=\"button\" class=\"btn btn-violet\" id=\"dlBtn\" data-hover=\"\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 3v13M7 12l5 5 5-5M5 21h14\"><\u002Fpath><\u002Fsvg>\n          <span class=\"label\">Scarica per <span id=\"dlBrowser\">Chrome<\u002Fspan><\u002Fspan>\n        <\u002Fbutton>\n\n        <div class=\"dl-progress\" id=\"dlProgress\">\n          <div class=\"row1\">\n            <div class=\"file\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>\n              <span id=\"dlFileName\">context-v2.4.1.crx<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"pct\" id=\"dlPct\">0%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bar\"><div class=\"fill\" id=\"dlFill\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"info\">\n            <span id=\"dlSpeed\">— MB/s<\u002Fspan>\n            <span id=\"dlState\">In coda...<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"next-steps\">\n          <h4>\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 6v6l4 2\"><\u002Fpath><\u002Fsvg>\n            Prossimi 30 secondi\n          <\u002Fh4>\n          <ol>\n            <li>Apri il file scaricato e conferma l'installazione nel browser.<\u002Fli>\n            <li>Accedi con <strong style=\"color:var(--ink)\" id=\"nextEmail\">la tua email<\u002Fstrong> direttamente dal pannello.<\u002Fli>\n            <li>Apri Meet o Teams: Context si attiva da solo.<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<script>\n/* ── Custom cursor (same as landing) ───────────────────── */\n(function(){\n  const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');\n  if(!dot||!ring) return;\n  let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;\n  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`});\n  function tick(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(tick)}\n  tick();\n  document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,input,label,[data-hover]'))ring.classList.add('is-hover')});\n  document.addEventListener('mouseout',e=>{if(!e.relatedTarget||!e.relatedTarget.closest||!e.relatedTarget.closest('a,button,input,label,[data-hover]'))ring.classList.remove('is-hover')});\n})();\n\n/* ── Form validation + navigation ──────────────────────── */\nconst form=document.getElementById('regForm');\nconst screen1=document.getElementById('screen1');\nconst screen2=document.getElementById('screen2');\nconst bar1=document.getElementById('bar1');\nconst stepInd1=document.getElementById('stepInd1');\nconst stepInd2=document.getElementById('stepInd2');\n\nconst userInput=document.getElementById('username');\nconst emailInput=document.getElementById('email');\nconst termsInput=document.getElementById('terms');\nconst userWrap=document.getElementById('userWrap');\nconst emailWrap=document.getElementById('emailWrap');\nconst submitBtn=document.getElementById('submitBtn');\n\nconst usernameRe=/^[a-zA-Z0-9._]{3,24}$/;\nconst emailRe=/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\n\nfunction validateUser(){\n  const ok=usernameRe.test(userInput.value.trim());\n  userWrap.classList.toggle('invalid',!ok && userInput.value.length>0);\n  return ok;\n}\nfunction validateEmail(){\n  const ok=emailRe.test(emailInput.value.trim());\n  emailWrap.classList.toggle('invalid',!ok && emailInput.value.length>0);\n  return ok;\n}\nuserInput.addEventListener('input',validateUser);\nuserInput.addEventListener('blur',validateUser);\nemailInput.addEventListener('input',validateEmail);\nemailInput.addEventListener('blur',validateEmail);\n\nform.addEventListener('submit',e=>{\n  e.preventDefault();\n  const uOK=validateUser(), eOK=validateEmail();\n  if(!uOK){userWrap.classList.add('invalid');userInput.focus();return}\n  if(!eOK){emailWrap.classList.add('invalid');emailInput.focus();return}\n  if(!termsInput.checked){\n    // shake the checkbox row\n    const lbl=termsInput.closest('label');\n    lbl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-3px)'},{transform:'translateX(0)'}],{duration:300});\n    return;\n  }\n  // simulate creation\n  submitBtn.disabled=true;\n  const label=submitBtn.querySelector('.label');\n  const arrow=submitBtn.querySelector('.arrow');\n  arrow.style.display='none';\n  label.textContent='Creazione account...';\n  const sp=document.createElement('span');sp.className='spinner';submitBtn.prepend(sp);\n\n  setTimeout(()=>{\n    // success → switch screens\n    sessionStorage.setItem('ctx_user',userInput.value.trim());\n    sessionStorage.setItem('ctx_email',emailInput.value.trim());\n    goToDownload();\n  },900);\n});\n\nfunction goToDownload(){\n  // hydrate\n  document.getElementById('greetName').textContent=userInput.value.trim();\n  document.getElementById('nextEmail').textContent=emailInput.value.trim();\n  // stepper anim\n  stepInd1.classList.remove('active');stepInd1.classList.add('done');\n  bar1.classList.add('fill');\n  setTimeout(()=>stepInd2.classList.add('active'),300);\n  // switch\n  screen1.classList.remove('active');\n  screen2.classList.add('active');\n}\n\n/* ── SSO shortcuts (mock) ──────────────────────────────── */\ndocument.querySelectorAll('[data-sso]').forEach(b=>{\n  b.addEventListener('click',()=>{\n    const provider=b.dataset.sso;\n    userInput.value = provider==='google' ? 'marco.b' : 'm.bianchi';\n    emailInput.value = provider==='google' ? 'marco.bianchi@gmail.com' : 'm.bianchi@azienda.it';\n    termsInput.checked=true;\n    setTimeout(()=>{\n      sessionStorage.setItem('ctx_user',userInput.value);\n      sessionStorage.setItem('ctx_email',emailInput.value);\n      goToDownload();\n    },400);\n  });\n});\n\n/* ── Browser detection ─────────────────────────────────── */\n(function(){\n  const ua=navigator.userAgent;\n  let pick='chrome';\n  if(/Edg\\//.test(ua)) pick='edge';\n  else if(/OPR\\/|Opera/.test(ua)) pick='chrome';\n  else if(/Brave/.test(ua) || navigator.brave) pick='brave';\n  else if(/Arc/.test(ua)) pick='arc';\n  selectBrowser(pick);\n})();\n\nfunction selectBrowser(b){\n  document.querySelectorAll('.browser').forEach(el=>el.classList.toggle('sel',el.dataset.browser===b));\n  document.getElementById('dlBrowser').textContent=b.charAt(0).toUpperCase()+b.slice(1);\n  const ext = b==='arc' || b==='brave' ? 'crx' : (b==='edge'?'crx':'crx');\n  const file=`context-v2.4.1.${ext}`;\n  document.getElementById('fileName').textContent=file;\n  document.getElementById('dlFileName').textContent=file;\n}\ndocument.querySelectorAll('.browser').forEach(b=>{\n  b.addEventListener('click',()=>selectBrowser(b.dataset.browser));\n});\n\n/* ── Fake download progress + actual file trigger ──────── */\nconst dlBtn=document.getElementById('dlBtn');\nconst dlProg=document.getElementById('dlProgress');\nconst dlFill=document.getElementById('dlFill');\nconst dlPct=document.getElementById('dlPct');\nconst dlSpeed=document.getElementById('dlSpeed');\nconst dlState=document.getElementById('dlState');\n\ndlBtn.addEventListener('click',()=>{\n  dlBtn.disabled=true;\n  dlProg.classList.add('show');\n  dlProg.classList.remove('done');\n  dlState.textContent='Connessione...';\n  dlSpeed.textContent='— MB/s';\n  let p=0;\n  const start=performance.now();\n  const tick=()=>{\n    const speed=(2.4+Math.random()*1.8);\n    p += speed * 1.2;\n    if(p>100) p=100;\n    dlFill.style.width=p+'%';\n    dlPct.textContent=Math.floor(p)+'%';\n    const elapsed=(performance.now()-start)/1000;\n    dlSpeed.textContent=speed.toFixed(1)+' MB/s';\n    if(p<100){\n      dlState.textContent='Scaricamento... '+(elapsed.toFixed(1))+'s';\n      setTimeout(tick,140);\n    } else {\n      dlState.textContent='Completato ✓';\n      dlProg.classList.add('done');\n      triggerActualDownload();\n      const lbl=dlBtn.querySelector('.label');\n      lbl.innerHTML='Scaricato. <span style=\"opacity:.7\">Apri il file ↗<\u002Fspan>';\n      setTimeout(()=>{dlBtn.disabled=false},800);\n    }\n  };\n  setTimeout(tick,400);\n});\n\nfunction triggerActualDownload(){\n  // Generate a small placeholder file so the browser actually downloads something\n  const name=document.getElementById('fileName').textContent;\n  const user=sessionStorage.getItem('ctx_user')||'user';\n  const email=sessionStorage.getItem('ctx_email')||'';\n  const content=\n`Context — Chrome Extension installer (placeholder)\nVersion: 2.4.1\nGenerated for: ${user} <${email}>\nDate: ${new Date().toISOString()}\n\nThis is a demo build. In production this file is the signed .crx\nextension package — open it in Chrome / Edge / Brave / Arc to install.\n\nThanks for installing Context.\n— Context Labs, Milano`;\n  const blob=new Blob([content],{type:'application/octet-stream'});\n  const url=URL.createObjectURL(blob);\n  const a=document.createElement('a');\n  a.href=url;a.download=name;document.body.appendChild(a);a.click();\n  setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},2000);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
